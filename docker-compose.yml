services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskly
      POSTGRES_USER: taskly_user
      POSTGRES_PASSWORD: taskly_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskly_user -d taskly"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://taskly_user:taskly_pass@db:5432/taskly
      JWT_SECRET: VGhpc0lzQVNlY3JldEtleUZvckp3dFNpZ25pbmdXaXRoMjU2Qml0cyE=
      FRONTEND_URL: http://localhost:3000
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
